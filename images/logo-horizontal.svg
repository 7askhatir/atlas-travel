<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8892E"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#D4B96A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B2D4D"/>
      <stop offset="100%" stop-color="#07192E"/>
    </linearGradient>
  </defs>

  <!-- Background pill (for dark mode / vehicle branding) -->
  <rect x="-10" y="-10" width="620" height="160" rx="30" fill="url(#bgGlow)" opacity="0"/>

  <!-- ===== ICON ===== -->
  <g transform="translate(20, 20)">
    <!-- Shield / Badge outline -->
    <path d="M50 0 C77.6 0 100 22.4 100 50 C100 85 80 105 50 120 C20 105 0 85 0 50 C0 22.4 22.4 0 50 0Z" fill="url(#bgGlow)" stroke="url(#goldGrad)" stroke-width="2.5"/>

    <!-- Moroccan star (subtle) -->
    <path d="M50 18 L53 30 L65 30 L55 38 L59 50 L50 42 L41 50 L45 38 L35 30 L47 30 Z" fill="url(#goldGrad)" opacity="0.6"/>

    <!-- Connecting road curve -->
    <path d="M20 60 C20 50, 35 40, 50 55 C65 70, 80 45, 80 38" stroke="url(#roadGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Start point (Marrakech) -->
    <circle cx="20" cy="60" r="5" fill="url(#goldGrad)"/>
    <circle cx="20" cy="60" r="2" fill="#fff"/>

    <!-- End point (Essaouira) with arrow -->
    <circle cx="80" cy="38" r="5" fill="url(#goldGrad)"/>
    <circle cx="80" cy="38" r="2" fill="#fff"/>

    <!-- Motion lines behind vehicle -->
    <line x1="45" y1="56" x2="38" y2="62" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="48" y1="52" x2="42" y2="58" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <line x1="52" y1="48" x2="46" y2="54" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

    <!-- Car silhouette on the road -->
    <g transform="translate(66, 38) rotate(-35)">
      <rect x="-8" y="-4" width="16" height="8" rx="3" fill="#fff" opacity="0.9"/>
      <rect x="-5" y="-2" width="10" height="4" rx="1.5" fill="url(#bgGlow)"/>
    </g>
  </g>

  <!-- ===== TYPOGRAPHY ===== -->
  <g transform="translate(135, 42)">
    <!-- Marrakech -->
    <text x="0" y="0" font-family="'Poppins', 'Inter', Arial, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF" letter-spacing="4">MARRAKECH</text>

    <!-- Em dash separator with gold diamond -->
    <rect x="0" y="10" width="16" height="2" rx="1" fill="url(#goldGrad)"/>
    <rect x="8" y="8" width="6" height="6" rx="1" fill="url(#goldGrad)" transform="rotate(45 11 11)"/>

    <!-- Essaouira -->
    <text x="24" y="0" font-family="'Poppins', 'Inter', Arial, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF" letter-spacing="4">ESSAOUIRA</text>

    <!-- Transfer (large, emphasized) -->
    <text x="0" y="42" font-family="'Poppins', 'Inter', Arial, sans-serif" font-weight="800" font-size="32" fill="url(#goldGrad)" letter-spacing="6">TRANSFER</text>

    <!-- Tagline -->
    <text x="0" y="62" font-family="'Inter', Arial, sans-serif" font-weight="400" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="3">PRIVATE PREMIUM TRANSPORT</text>
  </g>
</svg>
